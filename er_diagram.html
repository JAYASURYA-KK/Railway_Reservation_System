<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ER Diagram - Train Booking System</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f0f2f5;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }
  .container {
    background: white;
    border-radius: 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    padding: 40px 50px;
  }
  h1 {
    text-align: center;
    color: #1a1a2e;
    font-size: 24px;
    margin-bottom: 8px;
    letter-spacing: 0.5px;
  }
  .subtitle {
    text-align: center;
    color: #6c757d;
    font-size: 13px;
    margin-bottom: 24px;
  }
  svg text {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }
</style>
</head>
<body>
<div class="container">
  <h1>Train Booking System — ER Diagram</h1>
  <p class="subtitle">Chen Notation: Rectangle = Entity &nbsp;|&nbsp; Diamond = Relationship &nbsp;|&nbsp; 1 / N = Cardinality</p>

<svg width="1400" height="920" viewBox="0 0 1400 920">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="1.5" dy="1.5" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
    <!-- Entity gradient -->
    <linearGradient id="entityGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357abd;stop-opacity:1" />
    </linearGradient>
    <!-- Relationship gradient -->
    <linearGradient id="relGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0ad4e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec971f;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- ============ CONNECTION LINES ============ -->
  <!-- Use polyline/path for cleaner routing where needed -->

  <!-- 1. STATION → <from> -->
  <line x1="670" y1="107" x2="540" y2="150" stroke="#555" stroke-width="2.2"/>
  <!-- Cardinality: 1 near STATION, N near from -->
  <text x="665" y="125" text-anchor="middle" font-size="15" font-weight="bold" fill="#c0392b">1</text>
  <text x="545" y="148" text-anchor="middle" font-size="15" font-weight="bold" fill="#c0392b">N</text>

  <!-- 2. <from> → TRAIN -->
  <line x1="540" y1="210" x2="670" y2="263" stroke="#555" stroke-width="2.2"/>
  <text x="545" y="225" text-anchor="middle" font-size="15" font-weight="bold" fill="#c0392b">1</text>
  <text x="665" y="258" text-anchor="middle" font-size="15" font-weight="bold" fill="#c0392b">N</text>

  <!-- 3. STATION → <to> -->
  <line x1="730" y1="107" x2="860" y2="150" stroke="#555" stroke-width="2.2"/>
  <text x="735" y="125" text-anchor="middle" font-size="15" font-weight="bold" fill="#c0392b">1</text>
  <text x="855" y="148" text-anchor="middle" font-size="15" font-weight="bold" fill="#c0392b">N</text>

  <!-- 4. <to> → TRAIN -->
  <line x1="860" y1="210" x2="730" y2="263" stroke="#555" stroke-width="2.2"/>
  <text x="855" y="225" text-anchor="middle" font-size="15" font-weight="bold" fill="#c0392b">1</text>
  <text x="735" y="258" text-anchor="middle" font-size="15" font-weight="bold" fill="#c0392b">N</text>

  <!-- 5. TRAIN → <status> -->
  <line x1="785" y1="290" x2="940" y2="290" stroke="#555" stroke-width="2.2"/>
  <text x="800" y="283" text-anchor="middle" font-size="15" font-weight="bold" fill="#c0392b">1</text>
  <text x="925" y="283" text-anchor="middle" font-size="15" font-weight="bold" fill="#c0392b">N</text>

  <!-- 6. <status> → TSTATUS -->
  <line x1="1060" y1="290" x2="1185" y2="290" stroke="#555" stroke-width="2.2"/>
  <text x="1075" y="283" text-anchor="middle" font-size="15" font-weight="bold" fill="#c0392b">1</text>
  <text x="1170" y="283" text-anchor="middle" font-size="15" font-weight="bold" fill="#c0392b">N</text>

  <!-- 7. TRAIN → <carries> -->
  <line x1="700" y1="317" x2="700" y2="380" stroke="#555" stroke-width="2.2"/>
  <text x="712" y="338" text-anchor="middle" font-size="15" font-weight="bold" fill="#c0392b">1</text>
  <text x="712" y="372" text-anchor="middle" font-size="15" font-weight="bold" fill="#c0392b">N</text>

  <!-- 8. <carries> → TICKET -->
  <line x1="700" y1="440" x2="700" y2="493" stroke="#555" stroke-width="2.2"/>
  <text x="712" y="460" text-anchor="middle" font-size="15" font-weight="bold" fill="#c0392b">1</text>
  <text x="712" y="490" text-anchor="middle" font-size="15" font-weight="bold" fill="#c0392b">N</text>

  <!-- 9. USERS → <books> -->
  <line x1="265" y1="720" x2="330" y2="660" stroke="#555" stroke-width="2.2"/>
  <text x="268" y="710" text-anchor="middle" font-size="15" font-weight="bold" fill="#c0392b">1</text>
  <text x="338" y="665" text-anchor="middle" font-size="15" font-weight="bold" fill="#c0392b">N</text>

  <!-- 10. <books> → TICKET -->
  <line x1="430" y1="600" x2="620" y2="547" stroke="#555" stroke-width="2.2"/>
  <text x="440" y="595" text-anchor="middle" font-size="15" font-weight="bold" fill="#c0392b">1</text>
  <text x="605" y="542" text-anchor="middle" font-size="15" font-weight="bold" fill="#c0392b">N</text>

  <!-- 11. PASSENGER → <for> -->
  <line x1="1135" y1="720" x2="1070" y2="660" stroke="#555" stroke-width="2.2"/>
  <text x="1130" y="710" text-anchor="middle" font-size="15" font-weight="bold" fill="#c0392b">1</text>
  <text x="1062" y="665" text-anchor="middle" font-size="15" font-weight="bold" fill="#c0392b">N</text>

  <!-- 12. <for> → TICKET -->
  <line x1="970" y1="600" x2="785" y2="547" stroke="#555" stroke-width="2.2"/>
  <text x="960" y="595" text-anchor="middle" font-size="15" font-weight="bold" fill="#c0392b">1</text>
  <text x="795" y="542" text-anchor="middle" font-size="15" font-weight="bold" fill="#c0392b">N</text>

  <!-- 13. USERS → <has> -->
  <polyline points="180,767 180,850 640,850" fill="none" stroke="#555" stroke-width="2.2"/>
  <text x="190" y="775" text-anchor="middle" font-size="15" font-weight="bold" fill="#c0392b">1</text>
  <text x="630" y="843" text-anchor="middle" font-size="15" font-weight="bold" fill="#c0392b">N</text>

  <!-- 14. <has> → PASSENGER -->
  <polyline points="760,850 1220,850 1220,767" fill="none" stroke="#555" stroke-width="2.2"/>
  <text x="770" y="843" text-anchor="middle" font-size="15" font-weight="bold" fill="#c0392b">1</text>
  <text x="1210" y="775" text-anchor="middle" font-size="15" font-weight="bold" fill="#c0392b">N</text>


  <!-- ============ ENTITY RECTANGLES ============ -->

  <!-- STATION -->
  <rect x="615" y="53" width="170" height="55" rx="6" fill="url(#entityGrad)" stroke="#2c5f8a" stroke-width="2" filter="url(#shadow)"/>
  <text x="700" y="86" text-anchor="middle" fill="white" font-size="17" font-weight="bold">STATION</text>

  <!-- TRAIN -->
  <rect x="615" y="263" width="170" height="55" rx="6" fill="url(#entityGrad)" stroke="#2c5f8a" stroke-width="2" filter="url(#shadow)"/>
  <text x="700" y="296" text-anchor="middle" fill="white" font-size="17" font-weight="bold">TRAIN</text>

  <!-- TSTATUS -->
  <rect x="1185" y="263" width="170" height="55" rx="6" fill="url(#entityGrad)" stroke="#2c5f8a" stroke-width="2" filter="url(#shadow)"/>
  <text x="1270" y="296" text-anchor="middle" fill="white" font-size="17" font-weight="bold">TSTATUS</text>

  <!-- TICKET -->
  <rect x="615" y="493" width="170" height="55" rx="6" fill="url(#entityGrad)" stroke="#2c5f8a" stroke-width="2" filter="url(#shadow)"/>
  <text x="700" y="526" text-anchor="middle" fill="white" font-size="17" font-weight="bold">TICKET</text>

  <!-- USERS -->
  <rect x="95" y="713" width="170" height="55" rx="6" fill="url(#entityGrad)" stroke="#2c5f8a" stroke-width="2" filter="url(#shadow)"/>
  <text x="180" y="746" text-anchor="middle" fill="white" font-size="17" font-weight="bold">USERS</text>

  <!-- PASSENGER -->
  <rect x="1135" y="713" width="170" height="55" rx="6" fill="url(#entityGrad)" stroke="#2c5f8a" stroke-width="2" filter="url(#shadow)"/>
  <text x="1220" y="746" text-anchor="middle" fill="white" font-size="17" font-weight="bold">PASSENGER</text>


  <!-- ============ RELATIONSHIP DIAMONDS ============ -->

  <!-- <from> (STATION ← TRAIN) -->
  <polygon points="540,150 600,180 540,210 480,180" fill="url(#relGrad)" stroke="#b87c19" stroke-width="2" filter="url(#shadow)"/>
  <text x="540" y="185" text-anchor="middle" fill="white" font-size="14" font-weight="bold">from</text>

  <!-- <to> (STATION ← TRAIN) -->
  <polygon points="860,150 920,180 860,210 800,180" fill="url(#relGrad)" stroke="#b87c19" stroke-width="2" filter="url(#shadow)"/>
  <text x="860" y="185" text-anchor="middle" fill="white" font-size="14" font-weight="bold">to</text>

  <!-- <status> (TRAIN → TSTATUS) -->
  <polygon points="1000,260 1060,290 1000,320 940,290" fill="url(#relGrad)" stroke="#b87c19" stroke-width="2" filter="url(#shadow)"/>
  <text x="1000" y="295" text-anchor="middle" fill="white" font-size="14" font-weight="bold">status</text>

  <!-- <carries> (TRAIN → TICKET) -->
  <polygon points="700,380 760,410 700,440 640,410" fill="url(#relGrad)" stroke="#b87c19" stroke-width="2" filter="url(#shadow)"/>
  <text x="700" y="415" text-anchor="middle" fill="white" font-size="13" font-weight="bold">carries</text>

  <!-- <books> (USERS → TICKET) -->
  <polygon points="380,600 440,630 380,660 320,630" fill="url(#relGrad)" stroke="#b87c19" stroke-width="2" filter="url(#shadow)"/>
  <text x="380" y="635" text-anchor="middle" fill="white" font-size="14" font-weight="bold">books</text>

  <!-- <for> (PASSENGER → TICKET) -->
  <polygon points="1020,600 1080,630 1020,660 960,630" fill="url(#relGrad)" stroke="#b87c19" stroke-width="2" filter="url(#shadow)"/>
  <text x="1020" y="635" text-anchor="middle" fill="white" font-size="14" font-weight="bold">for</text>

  <!-- <has> (USERS → PASSENGER) -->
  <polygon points="700,820 760,850 700,880 640,850" fill="url(#relGrad)" stroke="#b87c19" stroke-width="2" filter="url(#shadow)"/>
  <text x="700" y="855" text-anchor="middle" fill="white" font-size="14" font-weight="bold">has</text>


  <!-- ============ LEGEND ============ -->
  <rect x="20" y="15" width="210" height="95" rx="8" fill="#f8f9fa" stroke="#ddd" stroke-width="1"/>
  <text x="30" y="35" font-size="13" font-weight="bold" fill="#333">Legend</text>

  <rect x="30" y="44" width="50" height="22" rx="4" fill="url(#entityGrad)" stroke="#2c5f8a" stroke-width="1.5"/>
  <text x="90" y="60" font-size="12" fill="#333">= Entity</text>

  <polygon points="55,82 75,72 95,82 75,92" fill="url(#relGrad)" stroke="#b87c19" stroke-width="1.5"/>
  <text x="105" y="87" font-size="12" fill="#333">= Relationship</text>

  <text x="30" y="105" font-size="12" fill="#c0392b" font-weight="bold">1</text>
  <text x="42" y="105" font-size="12" fill="#333">= One</text>
  <text x="95" y="105" font-size="12" fill="#c0392b" font-weight="bold">N</text>
  <text x="108" y="105" font-size="12" fill="#333">= Many</text>

</svg>
</div>
</body>
</html>
